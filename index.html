<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

 

<title>Quán Ăn Hàn Quốc – Thùy Trang</title>

 

<style>

 

body{

font-family:Arial;

margin:0;

background:#f4f4f4;

}

 

header{

background:#d32f2f;

color:white;

padding:20px;

text-align:center;

}

 

.search{

text-align:center;

margin:20px;

}

 

.search input{

width:300px;

padding:10px;

}

 

.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

padding:20px;

}

 

.card{

background:white;

border-radius:10px;

overflow:hidden;

box-shadow:0 0 10px rgba(0,0,0,0.1);

}

 

.card img{

width:100%;

height:200px;

object-fit:cover;

}

 

.card h3{

padding:10px;

}

 

.card p{

padding:0 10px;

}

 

.btn{

display:inline-block;

background:#d32f2f;

color:white;

padding:10px 15px;

margin:10px;

text-decoration:none;

border-radius:5px;

}

 

.pagination{

text-align:center;

margin:20px;

}

 

.pagination button{

padding:10px;

margin:5px;

}

 

.payment{

background:white;

padding:30px;

text-align:center;

margin:20px;

border-radius:10px;

}

 

.payment img{

width:250px;

}

 

</style>

</head>

<body>

 

<header>

<h1>🍜 Quán Ăn Hàn Quốc</h1>

</header>

 

<div class="search">

<input type="text" id="search" placeholder="Tìm món ăn...">

</div>

 

<div class="container" id="foodContainer"></div>

 

<div class="pagination" id="pagination"></div>

 

<div class="payment">

 

<h2>Thanh Toán QR</h2>

 

<img src="qr1.jpg">

 

<p>

Sau khi chuyển khoản vui lòng ghi nội dung:

</p>

 

<b>Thanh toán đơn hàng</b>

 

</div>

 

<script>

 

const foods = [

 

{name:"Kimchi",price:"20.000đ",img:"images/1.jpg"},

{name:"Bibimbap",price:"60.000đ",img:"images/2.jpg"},

{name:"Tokbokki",price:"25.000đ",img:"3.jpg"},

{name:"Kimbap",price:"45.000đ",img:"images/4.jpg"},

{name:"Jajangmyeon",price:"65.000đ",img:"images/5.jpg"},

{name:"Bulgogi",price:"120.000đ",img:"images/6.jpg"},

{name:"Galbi",price:"150.000đ",img:"images/7.jpg"},

{name:"Samgyeopsal",price:"130.000đ",img:"images/8.jpg"},

{name:"Naengmyeon",price:"90.000đ",img:"images/9.jpg"},

{name:"Sundubu",price:"95.000đ",img:"images/10.jpg"},

{name:"Ramyeon",price:"45.000đ",img:"images/11.jpg"},

{name:"Hotteok",price:"35.000đ",img:"images/12.jpg"},

{name:"Odeng",price:"40.000đ",img:"images/13.jpg"},

{name:"Dakgalbi",price:"125.000đ",img:"images/14.jpg"},

{name:"Japchae",price:"70.000đ",img:"images/15.jpg"},

{name:"Bossam",price:"145.000đ",img:"images/16.jpg"},

{name:"Haemul Pajeon",price:"110.000đ",img:"images/17.jpg"},

{name:"Gyeranppang",price:"30.000đ",img:"images/18.jpg"}

 

];

 

let currentPage=1;

const perPage=6;

 

function displayFoods(data,page){

 

const container =

document.getElementById("foodContainer");

 

container.innerHTML="";

 

const start=(page-1)*perPage;

const end=start+perPage;

 

const paginated=

data.slice(start,end);

 

paginated.forEach(food=>{

 

container.innerHTML+=`

 

<div class="card">

 

<img src="${food.img}">

 

<h3>${food.name}</h3>

 

<p>${food.price}</p>

 

<a class="btn"

href="https://docs.google.com/forms/d/e/1FAIpQLScW2BhaNdyYe8LajRPcnuc89KzsM9G1sI4xExpjuxbBlNocTQ/viewform?usp=header"

target="_blank">

Đặt hàng

</a>

 

</div>

 

`;

 

});

 

renderPagination(data);

 

}

 

function renderPagination(data){

 

const totalPages=

Math.ceil(data.length/perPage);

 

const pagination=

document.getElementById("pagination");

 

pagination.innerHTML="";

 

for(let i=1;i<=totalPages;i++){

 

pagination.innerHTML+=

`<button onclick="goPage(${i})">${i}</button>`;

 

}

 

}

 

function goPage(page){

 

currentPage=page;

 

const keyword=

document.getElementById("search")

.value.toLowerCase();

 

const filtered=

foods.filter(f=>

f.name.toLowerCase().includes(keyword));

 

displayFoods(filtered,page);

 

}

 

document.getElementById("search")

.addEventListener("keyup",()=>{

 

const keyword=

document.getElementById("search")

.value.toLowerCase();

 

const filtered=

foods.filter(food=>

food.name.toLowerCase().includes(keyword));

 

displayFoods(filtered,1);

 

});

 

displayFoods(foods,1);

 

</script>

 

</body>

</html>
